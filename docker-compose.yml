version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: running-dashboard-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: running_db
      MYSQL_USER: runner
      MYSQL_PASSWORD: runnerpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 初期SQLの自動実行マウント
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data:
